<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فن التقنية الحديثة - مشغل القنوات والأفلام</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header>
        <h1>التطبيق الخاص - <span>فن التقنية الحديثة</span></h1>
        <p>مشغل قنوات IPTV احترافي (مضاد للتقطيع)</p>
    </header>

    <div class="container">
        <main class="player-section">
            <div class="video-container">
                <video id="tv-player" controls autoplay></video>
            </div>
            <h2 id="current-channel-name">اختر قناة للبدء...</h2>
        </main>

        <aside class="sidebar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="ابحث عن قناة أو فيلم...">
            </div>
            <div id="channels-list" class="channels-grid">
                <div class="loading">جاري تحميل البيانات...</div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
